name: Generate GitHub Pages

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
#  pull_request:
  workflow_dispatch:
    inputs:
      version_label:
        description: >-
          Deploy the current docs under this version label (e.g. "1.3.4")
          and tag it "latest". Leave blank to deploy as "dev". Use this to
          backfill a release whose git tag predates the mike/MkDocs setup.
        required: false
        default: ""

jobs:
  build-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      contents: write

    steps:
      - name: Configure Environment
        run: echo "$GITHUB_WORKSPACE/llvm/install/bin" >> $GITHUB_PATH

      # mike needs the full gh-pages branch history to update versions.json
      - name: Get the project repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          submodules: "true"

      # docs/programming_guide is a gitignored symlink to the repo-root
      # programming_guide/ tree (kept out of git so a stray `git add .` during
      # local `mkdocs serve` can't commit it). The nav references pages under it,
      # so recreate it here or the strict build aborts on missing-nav-target
      # warnings.
      - name: Link programming_guide into docs tree
        run: ln -s ../programming_guide docs/programming_guide

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install packages
        run: sudo apt-get install -y graphviz lld doxygen ninja-build

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          python utils/mlir_aie_wheels/vendor_eudsl.py \
              --requirements python/requirements.txt \
              --install-non-eudsl
          python -m pip install --require-hashes -r python/requirements_dev.lock
          pip install -r docs/requirements-mkdocs.txt

      - name: Get Submodule Hash
        id: get-submodule-hash
        run: echo "hash=$(md5sum $(echo utils/clone-llvm.sh))" >> $GITHUB_OUTPUT
        shell: bash

      - name: Ccache for C++ compilation
        # https://github.com/hendrikmuhs/ccache-action/releases/tag/v1.2.9
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          key: ${{ runner.os }}-releaseasserts-${{ steps.get-submodule-hash.outputs.hash }}
          max-size: 1G

      - name: Get cmakeModules
        id: clone-cmakeModules
        run: git clone --depth 1 https://github.com/Xilinx/cmakeModules.git
        shell: bash

      - name: Get MLIR
        id: mlir-wheels
        run: |
          VERSION=$(utils/clone-llvm.sh --get-wheel-version)
          pip -q download mlir==$VERSION \
            -f https://github.com/Xilinx/mlir-aie/releases/expanded_assets/mlir-distro
          unzip -q mlir-*.whl

          WHL=$(ls mlir-*.whl)
          echo "MLIR_WHEEL_VERSION=$VERSION" | tee -a $GITHUB_OUTPUT
          echo "MLIR_DIR=$PWD/mlir" | tee -a $GITHUB_OUTPUT

      - name: Build C++ Doxygen Docs
        run: |
          mkdir build_release
          pushd build_release

          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DCMAKE_MODULE_PATH=$PWD/../cmake/modulesXilinx \
            -DMLIR_DIR=$PWD/../mlir/lib/cmake/mlir \
            -DLLVM_DIR=$PWD/../mlir/lib/cmake/llvm \
            -DLLVM_USE_LINKER=lld \
            -DAIE_INCLUDE_DOCS=ON \
            -DLLVM_EXTERNAL_LIT=$(which lit)
          make docs
          popd

      - name: Render dialect graph
        run: |
          dot -Tpng docs/dialects.dot > docs/dialects.png
          dot -Tsvg docs/dialects.dot > docs/dialects.svg

      - name: Copy generated dialect docs into docs/
        run: |
          # cmake writes AIEDialect.md etc to build_release/docs/ via mlir-tblgen
          cp build_release/docs/*.md docs/ 2>/dev/null || true

      - name: Resolve version label
        id: version
        env:
          MANUAL_LABEL: ${{ github.event.inputs.version_label }}
        run: |
          # Also resolve the git ref that in-page "go read the source" links
          # should point at (consumed by docs/hooks/rewrite_source_links.py via
          # DOCS_GITHUB_REF). It must match the deployed docs version so a
          # pinned version's links don't drift to main.
          if [[ -n "${MANUAL_LABEL}" ]]; then
            # Manual backfill: workflow_dispatch with an explicit label
            # (e.g. "1.3"). Deploy under that label and make it "latest".
            # Point source links at the matching tag if it exists, else main.
            REF="main"
            if git rev-parse -q --verify "refs/tags/v${MANUAL_LABEL}" >/dev/null; then
              REF="v${MANUAL_LABEL}"
            fi
            echo "label=${MANUAL_LABEL}" >> $GITHUB_OUTPUT
            echo "aliases=latest" >> $GITHUB_OUTPUT
            echo "ref=${REF}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Full version per release: e.g. refs/tags/v1.4.0 → "1.4.0".
            # Every tagged release gets its own picker entry; the newest is
            # always aliased "latest". Source links pin to the release tag.
            LABEL="${GITHUB_REF#refs/tags/v}"
            echo "label=${LABEL}" >> $GITHUB_OUTPUT
            echo "aliases=latest" >> $GITHUB_OUTPUT
            echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            # main push -> "dev" docs; source links point at main.
            echo "label=dev" >> $GITHUB_OUTPUT
            echo "aliases=" >> $GITHUB_OUTPUT
            echo "ref=main" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with mike
        if: github.event_name != 'pull_request'
        env:
          # Consumed by docs/hooks/rewrite_source_links.py so in-page source
          # links point at the same git ref as this docs version.
          DOCS_GITHUB_REF: ${{ steps.version.outputs.ref }}
        run: |
          LABEL="${{ steps.version.outputs.label }}"
          ALIASES="${{ steps.version.outputs.aliases }}"

          if [ -n "$ALIASES" ]; then
            mike deploy --push --update-aliases "$LABEL" $ALIASES
          else
            mike deploy --push "$LABEL"
          fi

          # Ensure the root index.html redirects to the default version.
          # "latest" takes priority when it exists (i.e. after a tagged release);
          # otherwise fall back to "dev" for main-branch pushes.
          if mike list | grep -q "latest"; then
            mike set-default --push latest
          else
            mike set-default --push dev
          fi

      - name: Copy Doxygen output into gh-pages
        if: github.event_name != 'pull_request'
        run: |
          # mike has already pushed the MkDocs site to gh-pages. Inject the
          # Doxygen HTML under the versioned path and push.
          #
          # Use a dedicated worktree instead of `git checkout gh-pages` in the
          # main tree: the "Copy generated dialect docs" step overwrites the
          # tracked docs/*Dialect.md / *Passes.md stubs, leaving the tree dirty,
          # so a branch switch here would abort ("local changes would be
          # overwritten by checkout").
          LABEL="${{ steps.version.outputs.label }}"
          git fetch origin gh-pages
          git worktree add ../gh-pages-wt gh-pages

          # Remove legacy Jekyll/CMake detritus from the gh-pages root. mike
          # owns versioned subdirs (dev/, 1.x.y/, versions.json, index.html);
          # everything else at the root is carry-over from the old Jekyll setup.
          cd ../gh-pages-wt
          git ls-files \
            | grep -v '^\.nojekyll$' \
            | grep -v '^index\.html$' \
            | grep -v '^versions\.json$' \
            | grep -vE '^(dev|latest)/' \
            | grep -vE '^[0-9]+\.' \
            | xargs -r git rm -rf --ignore-unmatch -q
          cd -

          mkdir -p "../gh-pages-wt/${LABEL}/doxygen"
          # Doxygen writes under the docs/ subdir of the build tree because
          # docs/CMakeLists.txt sets OUTPUT_DIRECTORY to its own binary dir
          # (add_subdirectory(docs) => build_release/docs), matching the
          # "Copy generated dialect docs" step that reads build_release/docs/*.md.
          cp -r build_release/docs/doxygen/html "../gh-pages-wt/${LABEL}/doxygen/"
          git -C ../gh-pages-wt add "${LABEL}/doxygen/"
          git -C ../gh-pages-wt diff --cached --quiet \
            || git -C ../gh-pages-wt commit -m "docs: add Doxygen output for ${LABEL}"
          git -C ../gh-pages-wt push origin gh-pages
          git worktree remove ../gh-pages-wt
