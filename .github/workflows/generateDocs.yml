name: Generate GitHub Pages

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
#  pull_request:
  workflow_dispatch:
    inputs:
      version_label:
        description: >-
          Deploy the current docs under this version label (e.g. "1.3.4")
          and tag it "latest". Leave blank to deploy as "dev". Use this to
          backfill a release whose git tag predates the mike/MkDocs setup.
        required: false
        default: ""

jobs:
  build-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      contents: write

    steps:
      - name: Configure Environment
        run: echo "$GITHUB_WORKSPACE/llvm/install/bin" >> $GITHUB_PATH

      # mike needs the full gh-pages branch history to update versions.json
      - name: Get the project repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          submodules: "true"

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install packages
        run: sudo apt-get install -y graphviz lld doxygen

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          python utils/mlir_aie_wheels/vendor_eudsl.py \
              --requirements python/requirements.txt \
              --install-non-eudsl
          python -m pip install --require-hashes -r python/requirements_dev.lock
          pip install -r docs/requirements-mkdocs.txt

      - name: Install Ninja
        # https://github.com/llvm/actions/tree/main/install-ninja
        uses: llvm/actions/install-ninja@6a57890d0e3f9f35dfc72e7e48bc5e1e527cdd6c  # main (no tags)

      - name: Get Submodule Hash
        id: get-submodule-hash
        run: echo "hash=$(md5sum $(echo utils/clone-llvm.sh))" >> $GITHUB_OUTPUT
        shell: bash

      - name: Ccache for C++ compilation
        # https://github.com/hendrikmuhs/ccache-action/releases/tag/v1.2.9
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          key: ${{ runner.os }}-releaseasserts-${{ steps.get-submodule-hash.outputs.hash }}
          max-size: 1G

      - name: Get cmakeModules
        id: clone-cmakeModules
        run: git clone --depth 1 https://github.com/Xilinx/cmakeModules.git
        shell: bash

      - name: Get MLIR
        id: mlir-wheels
        run: |
          VERSION=$(utils/clone-llvm.sh --get-wheel-version)
          pip -q download mlir==$VERSION \
            -f https://github.com/Xilinx/mlir-aie/releases/expanded_assets/mlir-distro
          unzip -q mlir-*.whl

          WHL=$(ls mlir-*.whl)
          echo "MLIR_WHEEL_VERSION=$VERSION" | tee -a $GITHUB_OUTPUT
          echo "MLIR_DIR=$PWD/mlir" | tee -a $GITHUB_OUTPUT

      - name: Build C++ Doxygen Docs
        run: |
          mkdir build_release
          pushd build_release

          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DCMAKE_MODULE_PATH=$PWD/../cmake/modulesXilinx \
            -DMLIR_DIR=$PWD/../mlir/lib/cmake/mlir \
            -DLLVM_DIR=$PWD/../mlir/lib/cmake/llvm \
            -DLLVM_USE_LINKER=lld \
            -DAIE_INCLUDE_DOCS=ON \
            -DLLVM_EXTERNAL_LIT=$(which lit)
          make docs
          popd

      - name: Render dialect graph
        run: |
          dot -Tpng docs/dialects.dot > docs/dialects.png
          dot -Tsvg docs/dialects.dot > docs/dialects.svg

      - name: Copy generated dialect docs into docs/
        run: |
          # cmake writes AIEDialect.md etc to build_release/docs/ via mlir-tblgen
          cp build_release/docs/*.md docs/ 2>/dev/null || true

      - name: Resolve version label
        id: version
        env:
          MANUAL_LABEL: ${{ github.event.inputs.version_label }}
        run: |
          if [[ -n "${MANUAL_LABEL}" ]]; then
            # Manual backfill: workflow_dispatch with an explicit label
            # (e.g. "1.3"). Deploy under that label and make it "latest".
            echo "label=${MANUAL_LABEL}" >> $GITHUB_OUTPUT
            echo "aliases=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Full version per release: e.g. refs/tags/v1.4.0 → "1.4.0".
            # Every tagged release gets its own picker entry; the newest is
            # always aliased "latest".
            LABEL="${GITHUB_REF#refs/tags/v}"
            echo "label=${LABEL}" >> $GITHUB_OUTPUT
            echo "aliases=latest" >> $GITHUB_OUTPUT
          else
            echo "label=dev" >> $GITHUB_OUTPUT
            echo "aliases=" >> $GITHUB_OUTPUT
          fi

      - name: Deploy with mike
        if: github.event_name != 'pull_request'
        run: |
          LABEL="${{ steps.version.outputs.label }}"
          ALIASES="${{ steps.version.outputs.aliases }}"

          if [ -n "$ALIASES" ]; then
            mike deploy --push --update-aliases "$LABEL" $ALIASES
          else
            mike deploy --push "$LABEL"
          fi

      - name: Copy Doxygen output into gh-pages
        if: github.event_name != 'pull_request'
        run: |
          # mike has already pushed the MkDocs site to gh-pages.
          # Check out gh-pages, inject Doxygen under the versioned path, push.
          LABEL="${{ steps.version.outputs.label }}"
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p "${LABEL}/doxygen"
          cp -r build_release/doxygen/html "${LABEL}/doxygen/"
          git add "${LABEL}/doxygen/"
          git diff --cached --quiet || git commit -m "docs: add Doxygen output for ${LABEL}"
          git push origin gh-pages
          git checkout -
