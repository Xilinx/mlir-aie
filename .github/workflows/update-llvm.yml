name: Update LLVM Version

on:
  workflow_dispatch:
    inputs:
      llvm_hash:
        description: 'Specific LLVM hash to use'
        required: false
        type: string
  schedule:
    # Run every other Monday at 6:00 UTC (approx biweekly)
    # Note: GitHub Actions cron doesn't support "every 2 weeks" directly.
    # Running weekly is usually fine, or 1st and 15th.
    # Using 1st and 15th of every month.
    - cron: '0 6 1,15 * *'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update-llvm:
    runs-on: ubuntu-latest
    # Cap total runtime: mlirDistro can take ~1h, leave headroom for the rest.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Identify target LLVM commit
        id: identify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.llvm_hash }}" ]; then
            python3 utils/update_llvm_version.py --identify-only --llvm-hash "${{ inputs.llvm_hash }}"
          else
            python3 utils/update_llvm_version.py --identify-only
          fi

      - name: Trigger mlirDistro and wait for wheel
        if: steps.identify.outputs.target_commit != '' && steps.identify.outputs.wheel_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ steps.identify.outputs.target_commit }}"
          echo "No mlir-distro wheel for $TARGET; dispatching mlirDistro to build one."
          # Capture timestamp before dispatch so we can disambiguate our run.
          DISPATCH_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run mlirDistro.yml -f LLVM_COMMIT="$TARGET"

          # Find the run we just dispatched. Filter by event + ref + createdAt
          # to avoid grabbing an unrelated workflow_dispatch.
          RUN_ID=""
          for i in $(seq 1 12); do
            sleep 5
            RUN_ID=$(gh run list \
              --workflow mlirDistro.yml \
              --event workflow_dispatch \
              --branch main \
              --limit 5 \
              --created ">=$DISPATCH_TS" \
              --json databaseId,createdAt \
              --jq 'sort_by(.createdAt) | .[0].databaseId // empty')
            if [ -n "$RUN_ID" ]; then break; fi
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::Could not locate dispatched mlirDistro run."
            exit 1
          fi

          echo "Watching mlirDistro run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status --interval 60

      - name: Apply update
        id: update
        if: steps.identify.outputs.target_commit != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 utils/update_llvm_version.py --llvm-hash "${{ steps.identify.outputs.target_commit }}"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected."
          fi

      - name: Select Assignee
        if: steps.check_changes.outputs.changes == 'true'
        id: assignee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f utils/llvm-update-rotation.txt ]; then
            users=($(cat utils/llvm-update-rotation.txt))
            count=${#users[@]}
            if [ $count -gt 0 ]; then
              # Find the last assignee
              last_assignee=$(gh pr list --state all --search "Update LLVM version in:title" --limit 1 --json assignees --jq '.[0].assignees[0].login')
              echo "Last assignee: $last_assignee"
              
              next_index=0
              if [ -n "$last_assignee" ]; then
                for i in "${!users[@]}"; do
                  if [[ "${users[$i]}" == "$last_assignee" ]]; then
                    next_index=$(( (i + 1) % count ))
                    break
                  fi
                done
              fi
              
              assignee=${users[$next_index]}
              echo "Selected assignee: $assignee"
              echo "assignee=$assignee" >> $GITHUB_OUTPUT
            else
              echo "No users found in rotation file."
              echo "assignee=" >> $GITHUB_OUTPUT
            fi
          else
            echo "Rotation file not found."
            echo "assignee=" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update LLVM version"
          title: "Update LLVM version"
          body: |
            Updates LLVM version based on `triton-shared` or `torch-mlir`.
            
            Reason: ${{ steps.update.outputs.bump_reason }}
            
            Triggered by: ${{ github.event_name }}
          branch: update-llvm-version
          base: main
          assignees: ${{ steps.assignee.outputs.assignee }}
          delete-branch: true
