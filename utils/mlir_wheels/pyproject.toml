[build-system]
requires = [
    "setuptools>=82.0.1",
    "wheel",
    "ninja",
    # i have no clue why but 3.28 will cause cmake to segfault when detecting ABI compatibility
    "cmake==4.3.2",
    "pybind11[global]>=3.0.4",
    "numpy",
    "dataclasses",
    "mlir-native-tools",
    "nanobind",
]
build-backend = "setuptools.build_meta"

[tool.cibuildwheel]
build-verbosity = 3
build = "cp312-*"
skip = ["*-manylinux_i686", "*-musllinux*"]
manylinux-aarch64-image = "manylinux_2_28"
manylinux-x86_64-image = "manylinux_2_28"
# Hash-required deps installed in before-build; --no-build-isolation makes
# pip reuse them instead of re-fetching [build-system].requires fresh.
build-frontend = { name = "pip", args = ["--no-build-isolation"] }

[tool.cibuildwheel.linux]
environment = { PATH = "/usr/lib/ccache:/usr/lib64/ccache:/usr/lib/ccache/bin:$PATH", PIP_NO_BUILD_ISOLATION = "false" }
before-build = [
    "{project}/scripts/docker_prepare_ccache.sh",
    "python -m pip install --require-hashes -r {project}/requirements.lock",
]
environment-pass = [
    "APPLY_PATCHES",
    "CIBW_ARCHS",
    "CMAKE_ARGS",
    "CMAKE_GENERATOR",
    "DATETIME",
    "HOST_CCACHE_DIR",
    "LLVM_PROJECT_COMMIT",
    "MATRIX_OS",
    "PARALLEL_LEVEL",
    "PIP_FIND_LINKS",
    "PIP_NO_BUILD_ISOLATION",
    "ENABLE_RTTI",
]

[tool.cibuildwheel.macos]
environment = { PATH = "/usr/local/opt/ccache/libexec:$PATH", PIP_NO_BUILD_ISOLATION = "false" }
before-build = [
    "python -m pip install --require-hashes -r {project}/requirements.lock",
]
repair-wheel-command = [
    "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"
]

[tool.cibuildwheel.windows]
environment = { PIP_NO_BUILD_ISOLATION = "false" }
before-build = [
    "python -m pip install --require-hashes -r {project}/ci-tools.lock",
    "python -m pip install --require-hashes -r {project}/requirements.lock",
]
