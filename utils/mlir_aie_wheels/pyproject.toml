[tool.cibuildwheel]
build-verbosity = 3
build = "cp312-* cp313-* cp314-*"
skip = ["*-manylinux_i686", "*-musllinux*"]
manylinux-aarch64-image = "manylinux_2_28"
manylinux-x86_64-image = "manylinux_2_28"
# Hash-required deps installed in before-build; --no-build-isolation makes
# pip reuse them instead of re-fetching [build-system].requires fresh.
build-frontend = { name = "pip", args = ["--no-build-isolation"] }

[tool.cibuildwheel.linux]
environment = { PATH = "/usr/lib/ccache:/usr/lib64/ccache:/usr/lib/ccache/bin:$PATH", PIP_NO_BUILD_ISOLATION = "false" }
before-build = [
    "{project}/scripts/docker_prepare_ccache.sh",
    "python -m pip install --require-hashes -r requirements.lock",
    "{project}/scripts/download_mlir.sh",
]
environment-pass = [
    "CIBW_ARCHS",
    "CMAKE_ARGS",
    "CMAKE_GENERATOR",
    "DATETIME",
    "HOST_CCACHE_DIR",
    "AIE_PROJECT_COMMIT",
    "AIE_WHEEL_KEEP_LOCAL",
    "AIE_WHEEL_VERSION",
    "MATRIX_OS",
    "PARALLEL_LEVEL",
    "PIP_FIND_LINKS",
    "PIP_NO_BUILD_ISOLATION",
    "ENABLE_RTTI",
]
repair-wheel-command = [
    "auditwheel repair -w {dest_dir} {wheel} --exclude libmlir_async_runtime.so --exclude libmlir_c_runner_utils.so --exclude libmlir_float16_utils.so --exclude libmlir_runner_utils.so --exclude libmlir_apfloat_wrappers.so"
]

[tool.cibuildwheel.macos]
environment = { PATH = "/usr/local/opt/ccache/libexec:$PATH", PIP_NO_BUILD_ISOLATION = "false" }
before-build = [
    "python -m pip install --require-hashes -r requirements.lock",
    "{project}/scripts/download_mlir.sh",
]
repair-wheel-command = [
    "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"
]

[tool.cibuildwheel.windows]
environment = { PIP_NO_BUILD_ISOLATION = "false" }
before-build = [
    "python -m pip install --require-hashes -r ci-tools.lock",
    "python -m pip install --require-hashes -r requirements.lock",
    'python "{project}/scripts/download_mlir.py"',
]

[build-system]
requires = ["setuptools>=82.0.1", "nanobind", "pip>=26.1.1", 'ninja!=1.13.0; platform_system=="Windows"']
build-backend = "setuptools.build_meta"
