config.suffixes = [".lit", ".py"]

# Gate on lit features rather than vitis_components to enable Peano.
backend_features = {"aietools_aie2", "aietools_aie2p", "peano"}
if not backend_features.intersection(set(config.available_features)):
    config.unsupported = True

config.excludes.add("util.py")

config.parallelism_group = "npu-xrt"
